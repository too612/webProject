spring.application.name=app


# Server Configuration
server.port=8080
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# 소스파일에 변화가 있을 때 자동으로 서버 재 시작 설정
spring.devtools.restart.enabled=true

# 정적 리소스에 변화가 있을 때 바로 반영한다.
spring.devtools.livereload.enabled=true

# Database Configuration
# database (postgres)
# log4j 미적용 (spring.datasource.driver-class-name)
spring.datasource.driver-class-name=org.postgresql.Driver
# log4j 적용 (spring.datasource.driver-class-name)
#spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
# log4j 미적용 (spring.datasource.url)
spring.datasource.url=jdbc:postgresql://localhost:5432/DEV
# log4j 적용 (spring.datasource.url)
#spring.datasource.url=jdbc:log4jdbc:postgresql://localhost:5432/DEV
spring.datasource.username=DEV
spring.datasource.password=dev

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.main.app.common.dto,com.main.app.auth.dto,com.main.app.official.dto
mybatis.configuration.map-underscore-to-camel-case=true

# Logging Configuration
logging.level.root=INFO
# MyBatis SQL 로깅
logging.level.com.main.app=DEBUG
logging.level.org.mybatis.spring=DEBUG
logging.level.org.sphinx.sqlmap=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.level.com.main.app.auth.mapper=DEBUG
logging.level.com.main.app.auth.controller=DEBUG
logging.level.com.main.app.auth.service=DEBUG
logging.file.name=logs/company-website.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# MyBatis SQL 로깅 상세
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# CORS Configuration (React dev server)
app.cors.allowed-origins=http://localhost:5173

# File Upload Configuration
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
