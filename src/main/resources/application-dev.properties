# Database Configuration (dev)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/DEV}
spring.datasource.username=${DB_USERNAME:DEV}
spring.datasource.password=${DB_PASSWORD:dev}

# CORS Configuration (React dev server)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging Configuration (dev)
logging.level.com.main.app=DEBUG
logging.level.org.mybatis.spring=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.level.com.main.app.common.auth=DEBUG

# MyBatis SQL 로깅 상세
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
