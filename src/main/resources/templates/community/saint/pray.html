<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>기도 요청</title>
    <th:block layout:fragment="css">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <style>
            /* 기도 요청 게시판 스타일 */
            .pray-content-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                padding-bottom: 20px;
                border-bottom: 1px solid #e9ecef;
                margin-bottom: 20px;
            }
            .pray-content-header h2 {
                margin: 0;
                font-size: 24px;
                font-weight: 600;
            }
            .content-stats {
                font-size: 14px;
                color: #6c757d;
                margin-top: 8px;
            }
            .status-badge {
                display: inline-block;
                padding: 3px 8px;
                font-size: 12px;
                font-weight: 600;
                border-radius: 12px;
                color: white;
                background-color: #4CAF50;
                margin-right: 8px;
                vertical-align: middle;
            }
            .badge-pending {
                background-color: #FF9800;
            }
            .badge-answered {
                background-color: #4CAF50;
            }
            .table-container {
                overflow-x: auto;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th, td {
                padding: 16px;
                text-align: left;
                border-bottom: 1px solid #e0e0e0;
            }
            th {
                background: #f8f9fa;
                font-weight: 600;
            }
            .post-title {
                font-weight: 500;
                color: #333;
                text-decoration: none;
            }
            .post-title:hover {
                color: #2196F3;
            }
            .pagination {
                display: flex;
                justify-content: center;
                padding: 30px 0;
                gap: 5px;
            }
            .pagination a, .pagination button {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                color: #666;
                border: 1px solid #e0e0e0;
                border-radius: 6px;
                transition: all 0.2s;
                background: white;
                cursor: pointer;
                text-decoration: none;
            }
            .pagination a:hover, .pagination button:hover {
                background: #f5f5f5;
            }
            .pagination a.active, .pagination button.active {
                background: #2196F3;
                color: white;
                border-color: #2196F3;
            }
            .search-area {
                border-top: 1px solid #e0e0e0;
                background: #f8f9fa;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
                margin: 0 -30px -30px;
                padding: 20px 30px;
            }
            .search-input-group {
                display: flex;
                gap: 10px;
                align-items: center;
            }
            .search-button-group {
                display: flex;
                gap: 10px;
            }
            .search-select, .search-input {
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 6px;
            }
            .search-input { width: 250px; }
            .search-btn {
                padding: 10px 20px;
                background: #2196F3;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 500;
            }
            .search-btn:hover {
                background: #1976D2;
            }
            .material-icons.file-icon {
                font-size: 18px;
                color: #6c757d;
                vertical-align: middle;
            }
            .lock-icon {
                font-size: 16px;
                color: #ff9800;
                vertical-align: middle;
                margin-right: 4px;
            }

            /* 모바일 최적화 */
            @media (max-width: 768px) {
                .pray-content-header {
                    flex-direction: column;
                    gap: 10px;
                }
                .pray-content-header h2 {
                    font-size: 20px;
                }
                th:nth-child(4), td:nth-child(4), /* 조회수 */
                th:nth-child(5), td:nth-child(5)  /* 등록일 */ {
                    display: none;
                }
                .search-area {
                    flex-direction: column;
                    gap: 12px;
                    padding: 15px;
                }
                .search-input-group {
                    width: 100%;
                }
                .search-select {
                    width: 90px;
                }
                .search-input {
                    flex: 1;
                    min-width: 0;
                }
                .search-button-group {
                    width: 100%;
                }
                .search-btn {
                    flex: 1;
                }
            }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <!-- 메시지 표시 영역 -->
        <div th:if="${message}" class="alert alert-info" role="alert" style="margin-bottom: 20px; padding: 15px; background-color: #d1ecf1; border: 1px solid #bee5eb; border-radius: 4px;">
            <p th:text="${message}" style="margin: 0;"></p>
        </div>

        <div class="pray-content-header">
            <div>
                <h2>기도 요청</h2>
                <div class="content-stats" th:if="${paging != null and !paging.isEmpty()}">
                    게시물 수: <span th:text="${paging.totalElements}">0</span> | 
                    페이지: <span th:text="${paging.number + 1}">0</span>/<span th:text="${paging.totalPages}">0</span>
                </div>
            </div>
        </div>

        <!-- 기도 요청 목록 테이블 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 8%;">번호</th>
                        <th>제목</th>
                        <th style="width: 8%;">첨부</th>
                        <th style="width: 12%;">작성자</th>
                        <th style="width: 10%;">조회수</th>
                        <th style="width: 15%;">등록일</th>
                    </tr>
                </thead>
                <tbody th:if="${!#lists.isEmpty(boards)}">
                    <tr th:each="board, iterStat : ${boards}">
                        <td th:text="${paging != null ? (paging.totalElements - (paging.number * paging.size) - iterStat.index) : iterStat.count}">번호</td>
                        <td style="text-align: left;">
                            <!-- 답글인 경우 들여쓰기 -->
                            <span th:if="${board.depth > 0}" th:style="'padding-left:' + ${board.depth * 15} + 'px'">
                                <span class="material-icons" style="font-size: 14px; color: #999;">subdirectory_arrow_right</span>
                            </span>
                            <!-- 비밀글이 아닌 경우 -->
                            <a th:if="${board.secret != 'Y'}" th:href="@{/community/saint/pray/view(rqstNo=${board.rqstNo})}" class="post-title">
                                <span th:text="${board.title}">기도 요청 제목</span>
                                <span th:if="${board.commentCount > 0}" th:text="'[' + ${board.commentCount} + ']'" style="color: #ff5722; font-weight: bold; font-size: 0.9em; margin-left: 5px;"></span>
                            </a>
                            <!-- 비밀글인 경우 -->
                            <a th:if="${board.secret == 'Y'}" href="javascript:void(0);" 
                               th:data-rqst-no="${board.rqstNo}"
                               onclick="alert('비밀글입니다. 백엔드 연동 후 비밀번호 확인 기능이 작동합니다.');"
                               class="post-title" style="cursor: pointer;">
                                <span class="material-icons lock-icon">lock</span>
                                <span th:text="${board.title}">기도 요청 제목</span>
                            </a>
                        </td>
                        <!-- 파일 첨부 여부 -->
                        <td style="text-align: center;">
                            <span th:if="${board.hasFile}" class="material-icons file-icon">attach_file</span>
                        </td>
                        <td th:text="${board.rqstId}">작성자</td>
                        <td style="text-align: center;" th:text="${board.views}">0</td>
                        <td th:text="${board.insDt != null ? #temporals.format(board.insDt, 'yyyy-MM-dd') : ''}">2025-01-01</td>
                    </tr>
                </tbody>
                <tbody th:if="${#lists.isEmpty(boards)}">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 50px;">등록된 기도 요청이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" th:if="${paging != null and !paging.isEmpty()}">
            <!-- 처음으로 -->
            <a th:href="@{/community/saint/pray(page=0, searchType=${param.searchType}, keyword=${param.keyword})}" th:if="${paging.number > 0}"><span>&laquo;</span></a>
            <!-- 이전 블록 -->
            <a th:href="@{/community/saint/pray(page=${(paging.number/10)*10 - 1}, searchType=${param.searchType}, keyword=${param.keyword})}" th:if="${paging.number >= 10}"><span>&lt;</span></a>
        
            <!-- 페이지 번호 -->
            <a th:each="page: ${#numbers.sequence( (paging.number/10)*10 + 1, T(java.lang.Math).min((paging.number/10)*10 + 10, paging.totalPages) )}"
               th:href="@{/community/saint/pray(page=${page - 1}, searchType=${param.searchType}, keyword=${param.keyword})}"
               th:text="${page}"
               th:classappend="${page == paging.number + 1} ? 'active' : ''"></a>
        
            <!-- 다음 블록 -->
            <a th:href="@{/community/saint/pray(page=${(paging.number/10)*10 + 10}, searchType=${param.searchType}, keyword=${param.keyword})}" th:if="${(paging.number/10)*10 + 10 < paging.totalPages}"><span>&gt;</span></a>
            <!-- 마지막으로 -->
            <a th:href="@{/community/saint/pray(page=${paging.totalPages - 1}, searchType=${param.searchType}, keyword=${param.keyword})}" th:if="${paging.number < paging.totalPages - 1}"><span>&raquo;</span></a>
        </div>

        <div class="search-area">
            <!-- 검색 입력 그룹 -->
            <div class="search-input-group">
                <select id="searchType" class="search-select" name="searchType">
                    <option value="title" th:selected="${param.searchType == 'title'}">제목</option>
                    <option value="cont" th:selected="${param.searchType == 'cont'}">내용</option>
                    <option value="rqstId" th:selected="${param.searchType == 'rqstId'}">작성자</option>
                </select>
                <input id="keyword" type="text" class="search-input" placeholder="검색어를 입력하세요" name="keyword" th:value="${param.keyword}">
            </div>
            <!-- 버튼 그룹 -->
            <div class="search-button-group">
                <button class="search-btn" id="search">검색</button>
                <button class="search-btn" id="write" style="background: #4CAF50;">글쓰기</button>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            /*
             * ============================================
             * 백엔드 연동 가이드
             * ============================================
             * 
             * 이 페이지가 정상 작동하려면 다음 백엔드 구성이 필요합니다:
             * 
             * 1. SaintController.java에 메서드 추가:
             *    - @GetMapping("/community/saint/pray") : 목록 조회
             *    - @GetMapping("/community/saint/pray/view") : 상세 조회
             *    - @GetMapping("/community/saint/pray/write") : 작성 폼
             *    - @PostMapping("/community/saint/pray/write") : 작성 처리
             *    - @PostMapping("/community/saint/pray/update") : 수정 처리
             *    - @PostMapping("/community/saint/pray/delete") : 삭제 처리
             * 
             * 2. BoardService에 PRAY 타입 지원:
             *    - boardType이 "PRAY"인 경우를 처리할 수 있도록 수정
             * 
             * 3. BoardMapper.xml에 쿼리 추가:
             *    - WHERE board_type = 'PRAY' 조건 추가
             * 
             * 4. 데이터베이스 테이블:
             *    - board 테이블의 board_type 컬럼에 'PRAY' 값을 사용
             * 
             * 예시 컨트롤러 메서드:
             * 
             * @GetMapping("/community/saint/pray")
             * public String prayList(Model model, 
             *                       @RequestParam(defaultValue = "0") int page,
             *                       @RequestParam(required = false) String searchType,
             *                       @RequestParam(required = false) String keyword) {
             *     Pageable pageable = PageRequest.of(page, 10);
             *     Page<BoardDto> paging = boardService.getBoardListByType("PRAY", searchType, keyword, pageable);
             *     model.addAttribute("boards", paging.getContent());
             *     model.addAttribute("paging", paging);
             *     model.addAttribute("submenu", "Y");
             *     return "community/saint/pray";
             * }
             */

            // 검색 기능
            document.getElementById('search').addEventListener('click', function() {
                const searchType = document.getElementById('searchType').value;
                const keyword = document.getElementById('keyword').value;

                if (!keyword.trim()) {
                    alert('검색어를 입력해주세요.');
                    return;
                }

                location.href = '/community/saint/pray?searchType=' + searchType + '&keyword=' + encodeURIComponent(keyword);
            });

            // 엔터키 검색
            document.getElementById('keyword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('search').click();
                }
            });

            // 글쓰기 버튼
            document.getElementById('write').addEventListener('click', function() {
                // 백엔드 연동 전에는 알림창 표시
                alert('기도 요청 작성 페이지로 이동합니다.\n백엔드 연동 후 작동: /community/saint/pray/write');
                // 백엔드 연동 후에는 아래 주석 해제
                // location.href = '/community/saint/pray/write';
            });
        </script>
    </th:block>
</body>
</html>
