<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <meta charset="UTF-8">
    <title>헌금관리</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/erp.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <section class="erp-dashboard-wrap">
        <div class="container">
            <div class="erp-header-card">
                <div>
                    <h1 class="erp-title">헌금관리</h1>
                    <p class="erp-subtitle">예산/수입/지출 현황을 기준으로 헌금 흐름을 확인합니다.</p>
                </div>
            </div>

            <section class="erp-card">
                <div class="erp-card-head">
                    <h2>헌금내역조회</h2>
                </div>
                <div class="erp-simple-list">
                    <p>• 기간별 헌금내역 조회</p>
                    <p>• 헌금 항목별 합계 확인</p>
                    <p>• 헌금자/입금수단 기준 검색</p>
                </div>
            </section>
        </div>
    </section>
</div>
</body>
</html>
