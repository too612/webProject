<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <meta charset="UTF-8">
    <title>설교관리</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/erp.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <section class="erp-dashboard-wrap">
        <div class="container">
            <div class="erp-header-card">
                <div>
                    <h1 class="erp-title">설교관리</h1>
                    <p class="erp-subtitle">이번 주 설교 작성 및 검토 상태를 관리합니다.</p>
                </div>
            </div>

            <section class="erp-card">
                <div class="erp-card-head">
                    <h2>설교본문관리</h2>
                    <a class="erp-main-btn" th:href="@{/sermon/write}">
                        <span class="material-icons">edit</span>
                        설교 작성
                    </a>
                </div>
                <div class="erp-simple-list">
                    <p>• 예배 유형별 설교 본문 등록</p>
                    <p>• 설교 제목/본문/개요 수정</p>
                    <p>• 작성 이력 및 검토 상태 관리</p>
                </div>
            </section>
        </div>
    </section>
</div>
</body>
</html>
