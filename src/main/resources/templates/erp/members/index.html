<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members Management - ERP</title>
</head>
<body>
    <div th:replace="layout/header :: header"></div>
    
    <main>
        <section class="members-section">
            <h1>Members Management</h1>
            <div class="members-list">
                <table th:if="${members} and ${members.size()} > 0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="member : ${members}">
                            <td th:text="${member.memberId}">ID</td>
                            <td th:text="${member.name}">Name</td>
                            <td th:text="${member.status}">Status</td>
                            <td><a href="#">Edit</a> | <a href="#">Delete</a></td>
                        </tr>
                    </tbody>
                </table>
                <p th:unless="${members} and ${members.size()} > 0">No members found</p>
            </div>
            <button><a href="#">Add Member</a></button>
        </section>
    </main>
    
    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
