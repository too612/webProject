<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management - ERP</title>
</head>
<body>
    <div th:replace="layout/header :: header"></div>
    
    <main>
        <section class="attendance-section">
            <h1>Attendance Management</h1>
            <div class="attendance-controls">
                <form th:action="@{/erp/attendance/search}" method="post">
                    <input type="date" name="searchDate" required>
                    <button type="submit">Search</button>
                </form>
            </div>
            <div class="attendance-list">
                <table th:if="${attendances} and ${attendances.size()} > 0">
                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Date</th>
                            <th>Present</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="attendance : ${attendances}">
                            <td th:text="${attendance.memberName}">Name</td>
                            <td th:text="${attendance.attendDate}">Date</td>
                            <td th:text="${attendance.present} ? 'Yes' : 'No'">Yes/No</td>
                            <td><a href="#">Edit</a></td>
                        </tr>
                    </tbody>
                </table>
                <p th:unless="${attendances} and ${attendances.size()} > 0">No records found</p>
            </div>
        </section>
    </main>
    
    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
