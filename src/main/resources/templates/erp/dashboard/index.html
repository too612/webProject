<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Dashboard - WebProject</title>
</head>
<body>
    <div th:replace="layout/header :: header"></div>
    
    <main>
        <section class="erp-dashboard">
            <h1>ERP Dashboard</h1>
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <h3>Members</h3>
                    <p th:text="${totalMembers} ?: 'N/A'">0</p>
                </div>
                <div class="dashboard-card">
                    <h3>Attendance</h3>
                    <p th:text="${attendanceRate} ?: 'N/A'">0%</p>
                </div>
                <div class="dashboard-card">
                    <h3>Offerings</h3>
                    <p th:text="${totalOfferings} ?: 'N/A'">$0</p>
                </div>
            </div>
        </section>
    </main>
    
    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
