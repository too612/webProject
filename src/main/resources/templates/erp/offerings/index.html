<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offerings Management - ERP</title>
</head>
<body>
    <div th:replace="layout/header :: header"></div>
    
    <main>
        <section class="offerings-section">
            <h1>Offerings Management</h1>
            <div class="offerings-summary">
                <div class="summary-card">
                    <h3>Total Offerings</h3>
                    <p th:text="${totalOfferings} ?: '$0'">$0</p>
                </div>
                <div class="summary-card">
                    <h3>This Month</h3>
                    <p th:text="${monthlyOfferings} ?: '$0'">$0</p>
                </div>
            </div>
            <div class="offerings-list">
                <table th:if="${offerings} and ${offerings.size()} > 0">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Donor</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="offering : ${offerings}">
                            <td th:text="${offering.offeringDate}">Date</td>
                            <td th:text="${offering.category}">Category</td>
                            <td th:text="'$' + ${offering.amount}">$0</td>
                            <td th:text="${offering.donorName}">Donor</td>
                        </tr>
                    </tbody>
                </table>
                <p th:unless="${offerings} and ${offerings.size()} > 0">No offerings recorded</p>
            </div>
        </section>
    </main>
    
    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
