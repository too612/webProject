<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <meta charset="UTF-8">
    <title>성도관리</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/erp.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <section class="erp-dashboard-wrap">
        <div class="container">
            <div class="erp-header-card">
                <div>
                    <h1 class="erp-title">성도관리</h1>
                    <p class="erp-subtitle">성도 기본 정보와 재적 상태를 확인합니다.</p>
                </div>
            </div>

            <section class="erp-card">
                <div class="erp-card-head">
                    <h2>성도정보조회및관리</h2>
                </div>
                <div class="erp-simple-list">
                    <p>• 성도 기본정보 조회/수정</p>
                    <p>• 교구/부서 배정 관리</p>
                    <p>• 신규 등록/전입/전출 이력 관리</p>
                </div>
            </section>
        </div>
    </section>
</div>
</body>
</html>
