<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle != null ? pageTitle : '시스템로그조회'}">시스템로그조회</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/erp.css}">
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <section class="erp-dashboard-wrap">
            <div class="container">
                <div class="erp-header-card">
                    <div>
                        <h1 class="erp-title" th:text="${pageTitle != null ? pageTitle : '시스템로그조회'}">시스템로그조회</h1>
                        <p class="erp-subtitle"
                            th:text="${pageDescription != null ? pageDescription : '시스템 이벤트 및 오류 로그를 조회하는 기본 화면입니다.'}">
                            시스템 이벤트 및 오류 로그를 조회하는 기본 화면입니다.</p>
                    </div>
                </div>
                <section class="erp-card">
                    <div class="erp-card-head">
                        <h2>기본 정보</h2>
                    </div>
                    <div class="erp-simple-list">
                        <p>메뉴 ID: <strong th:text="${menuId != null ? menuId : 'M_ADM_03_01'}">M_ADM_03_01</strong></p>
                        <p>상위 메뉴 ID: <strong
                                th:text="${parentMenuId != null ? parentMenuId : 'M_ADM_03'}">M_ADM_03</strong></p>
                        <p>경로: <strong
                                th:text="${pagePath != null ? pagePath : '/system/log/system'}">/system/log/system</strong>
                        </p>
                        <p>상세 기능은 추후 구현 예정입니다.</p>
                    </div>
                </section>
            </div>
        </section>
    </div>
</body>

</html>
