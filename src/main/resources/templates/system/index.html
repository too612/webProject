<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<head>
    <meta charset="UTF-8">
    <title>시스템관리 대시보드</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/system.css}">
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <section class="sys-wrap">
            <div class="container">
                <div class="sys-hero">
                    <div class="sys-hero-copy">
                        <p class="sys-kicker">System Control Center</p>
                        <h1 class="sys-title">시스템관리 대시보드</h1>
                        <p class="sys-subtitle">권한, 코드, 로그, 백업 운영 상태를 한 곳에서 관리합니다.</p>
                    </div>
                    <div class="sys-status">
                        <p class="sys-status-label">오늘 점검 상태</p>
                        <p class="sys-status-value">정상 운영중</p>
                        <p class="sys-status-time">마지막 점검 09:30</p>
                    </div>
                </div>

                <section class="sys-card">
                    <div class="sys-card-head">
                        <h2>핵심 운영 지표</h2>
                    </div>
                    <div class="sys-metric-grid">
                        <article class="sys-metric-item">
                            <p class="sys-metric-label">활성 계정</p>
                            <p class="sys-metric-value">142</p>
                        </article>
                        <article class="sys-metric-item">
                            <p class="sys-metric-label">오늘 경고 로그</p>
                            <p class="sys-metric-value">3</p>
                        </article>
                        <article class="sys-metric-item">
                            <p class="sys-metric-label">백업 성공률</p>
                            <p class="sys-metric-value">99.2%</p>
                        </article>
                        <article class="sys-metric-item">
                            <p class="sys-metric-label">미반영 권한요청</p>
                            <p class="sys-metric-value">5</p>
                        </article>
                    </div>
                </section>

                <div class="sys-grid">
                    <section class="sys-card">
                        <div class="sys-card-head">
                            <h2>사용자/권한관리</h2>
                        </div>
                        <div class="sys-link-grid">
                            <a th:href="@{/system/user/manager}">사용자계정관리</a>
                            <a th:href="@{/system/user/role}">권한역할관리</a>
                        </div>
                    </section>

                    <section class="sys-card">
                        <div class="sys-card-head">
                            <h2>운영설정관리</h2>
                        </div>
                        <div class="sys-link-grid">
                            <a th:href="@{/system/config/code}">공통코드관리</a>
                            <a th:href="@{/system/config/menu}">메뉴권한관리</a>
                        </div>
                    </section>

                    <section class="sys-card">
                        <div class="sys-card-head">
                            <h2>로그/감사관리</h2>
                        </div>
                        <div class="sys-link-grid">
                            <a th:href="@{/system/log/system}">시스템로그조회</a>
                            <a th:href="@{/system/log/audit}">감사추적관리</a>
                        </div>
                    </section>

                    <section class="sys-card">
                        <div class="sys-card-head">
                            <h2>백업/복구관리</h2>
                        </div>
                        <div class="sys-link-grid">
                            <a th:href="@{/system/backup/policy}">백업정책관리</a>
                            <a th:href="@{/system/backup/history}">복구이력관리</a>
                        </div>
                    </section>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
