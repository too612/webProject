<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>다사랑교회 - 문의 등록</title>
    <th:block layout:fragment="css">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <style>
            .write-container {
                max-width: 900px;
                margin: 0 auto;
                background: white;
                border-radius: 8px;
                padding: 30px;
            }

            .write-header {
                border-bottom: 2px solid #2196F3;
                margin-bottom: 30px;
                padding-bottom: 15px;
            }

            .write-header h2 {
                margin: 0;
                font-size: 24px;
                font-weight: 600;
                color: #333;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-label {
                display: block;
                font-weight: 600;
                margin-bottom: 8px;
                color: #333;
            }

            .form-label .required {
                color: #d32f2f;
                margin-left: 4px;
            }

            .form-input, .form-textarea, .form-select {
                width: 100%;
                padding: 12px;
                border: 1px solid #ddd;
                border-radius: 6px;
                font-size: 14px;
                font-family: inherit;
                box-sizing: border-box;
            }

            .form-input:focus, .form-textarea:focus, .form-select:focus {
                outline: none;
                border-color: #2196F3;
                box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
            }

            .form-group-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }

            .form-textarea {
                resize: vertical;
                min-height: 300px;
            }

            .form-help {
                font-size: 12px;
                color: #999;
                margin-top: 5px;
            }

            .password-info {
                background: #e3f2fd;
                border-left: 4px solid #2196F3;
                padding: 12px;
                border-radius: 4px;
                font-size: 13px;
                color: #424242;
                margin-bottom: 20px;
            }

            .button-group {
                display: flex;
                gap: 10px;
                justify-content: center;
                margin-top: 30px;
                padding-top: 20px;
                border-top: 1px solid #e0e0e0;
            }

            .btn {
                padding: 12px 30px;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s;
            }

            .btn-submit {
                background: #4CAF50;
                color: white;
            }

            .btn-submit:hover {
                background: #45a049;
            }

            .btn-cancel {
                background: #e0e0e0;
                color: #333;
            }

            .btn-cancel:hover {
                background: #d0d0d0;
            }

            @media (max-width: 768px) {
                .write-container {
                    padding: 15px;
                }

                .form-group-row {
                    grid-template-columns: 1fr;
                    gap: 15px;
                }

                .button-group {
                    flex-direction: column;
                }

                .btn {
                    width: 100%;
                }

                .form-textarea {
                    min-height: 200px;
                }
            }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <div class="write-container">
            <div class="write-header">
                <h2>문의 등록</h2>
            </div>

            <form method="post" th:action="@{/support/qna/write}" id="qnaForm">
                <!-- 제목 -->
                <div class="form-group">
                    <label class="form-label">제목 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="title" name="title" required 
                           placeholder="문의 제목을 입력해주세요." maxlength="200">
                    <div class="form-help">최대 200자까지 입력 가능합니다.</div>
                </div>

                <!-- 이름과 이메일 -->
                <div class="form-group-row">
                    <div class="form-group">
                        <label class="form-label">이름 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="author" name="author" required 
                               placeholder="이름을 입력해주세요." maxlength="50">
                    </div>
                    <div class="form-group">
                        <label class="form-label">이메일 <span class="required">*</span></label>
                        <input type="email" class="form-input" id="email" name="email" required 
                               placeholder="user@example.com">
                    </div>
                </div>

                <!-- 연락처 -->
                <div class="form-group">
                    <label class="form-label">연락처 <span class="required">*</span></label>
                    <input type="tel" class="form-input" id="phone" name="phone" required 
                           placeholder="010-1234-5678">
                    <div class="form-help">답변 완료 후 이 번호로 연락드리겠습니다.</div>
                </div>

                <!-- 문의 내용 -->
                <div class="form-group">
                    <label class="form-label">문의 내용 <span class="required">*</span></label>
                    <textarea class="form-textarea" id="content" name="content" required 
                              placeholder="문의 내용을 자세히 입력해주세요."></textarea>
                </div>

                <!-- 비밀번호 -->
                <div class="password-info">
                    <strong>🔒 개인정보 보호</strong><br/>
                    아래 비밀번호는 게시물을 수정/삭제할 때 필요합니다. 안전한 비밀번호를 설정해주세요.
                </div>

                <div class="form-group">
                    <label class="form-label">비밀번호 <span class="required">*</span></label>
                    <input type="password" class="form-input" id="password" name="password" required 
                           placeholder="비밀번호를 입력해주세요." minlength="4">
                    <div class="form-help">최소 4자 이상의 비밀번호를 설정해주세요.</div>
                </div>

                <div class="form-group">
                    <label class="form-label">비밀번호 확인 <span class="required">*</span></label>
                    <input type="password" class="form-input" id="confirmPassword" name="confirmPassword" required 
                           placeholder="비밀번호를 다시 입력해주세요.">
                </div>

                <!-- 버튼 그룹 -->
                <div class="button-group">
                    <button type="submit" class="btn btn-submit">등록하기</button>
                    <button type="button" class="btn btn-cancel" onclick="history.back()">취소</button>
                </div>
            </form>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            document.getElementById('qnaForm').addEventListener('submit', function(e) {
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (password !== confirmPassword) {
                    e.preventDefault();
                    alert('비밀번호가 일치하지 않습니다.');
                    return false;
                }

                if (password.length < 4) {
                    e.preventDefault();
                    alert('비밀번호는 최소 4자 이상이어야 합니다.');
                    return false;
                }

                return true;
            });
        </script>
    </th:block>
</body>
</html>
