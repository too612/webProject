<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>다사랑교회 - 문의 상세</title>
    <th:block layout:fragment="css">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <style>
            .view-container {
                max-width: 900px;
                margin: 0 auto;
                background: white;
                border-radius: 8px;
                padding: 30px;
            }

            .view-header {
                border-bottom: 2px solid #e0e0e0;
                padding-bottom: 20px;
                margin-bottom: 20px;
            }

            .view-header h2 {
                margin: 0 0 15px 0;
                font-size: 28px;
                font-weight: 600;
                color: #333;
                word-break: break-word;
            }

            .view-meta {
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 10px;
                font-size: 13px;
                color: #999;
            }

            .meta-left {
                display: flex;
                gap: 20px;
                align-items: center;
            }

            .meta-item {
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .meta-item .material-icons {
                font-size: 16px;
            }

            .answer-badge {
                display: inline-block;
                padding: 4px 12px;
                background: #4CAF50;
                color: white;
                border-radius: 12px;
                font-size: 12px;
                font-weight: 600;
            }

            .answer-badge.pending {
                background: #ff9800;
            }

            .view-content {
                background: #f9f9f9;
                padding: 20px;
                border-radius: 8px;
                margin-bottom: 30px;
                line-height: 1.8;
                word-break: break-word;
                white-space: pre-wrap;
            }

            .view-content p {
                margin: 0;
            }

            .contact-info {
                background: #e3f2fd;
                border-left: 4px solid #2196F3;
                padding: 15px;
                border-radius: 4px;
                margin-bottom: 20px;
                font-size: 14px;
                color: #424242;
            }

            .contact-info strong {
                display: block;
                margin-bottom: 8px;
                color: #1976D2;
            }

            .contact-info p {
                margin: 5px 0;
            }

            /* 답변 영역 */
            .answer-section {
                background: #fff8f0;
                border: 2px solid #ff9800;
                border-radius: 8px;
                padding: 20px;
                margin-bottom: 30px;
            }

            .answer-section h3 {
                margin: 0 0 15px 0;
                font-size: 18px;
                color: #d32f2f;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .answer-section h3 .material-icons {
                font-size: 24px;
            }

            .answer-content {
                background: white;
                padding: 15px;
                border-radius: 6px;
                line-height: 1.8;
                word-break: break-word;
                white-space: pre-wrap;
            }

            .no-answer {
                color: #999;
                text-align: center;
                padding: 30px;
                background: white;
                border-radius: 6px;
                border: 1px dashed #ddd;
            }

            .action-buttons {
                display: flex;
                gap: 10px;
                margin-bottom: 30px;
                padding-bottom: 20px;
                border-bottom: 1px solid #e0e0e0;
            }

            .btn {
                padding: 10px 20px;
                border: none;
                border-radius: 6px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s;
            }

            .btn-primary {
                background: #2196F3;
                color: white;
            }

            .btn-primary:hover {
                background: #1976D2;
            }

            .btn-danger {
                background: #d32f2f;
                color: white;
            }

            .btn-danger:hover {
                background: #c62828;
            }

            .btn-secondary {
                background: #e0e0e0;
                color: #333;
            }

            .btn-secondary:hover {
                background: #d0d0d0;
            }

            /* 비밀번호 확인 모달 */
            .modal-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1000;
                justify-content: center;
                align-items: center;
            }

            .modal-overlay.active {
                display: flex;
            }

            .modal-content {
                background: white;
                padding: 30px;
                border-radius: 8px;
                width: 400px;
                text-align: center;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            }

            .modal-title {
                font-size: 18px;
                font-weight: 600;
                margin-bottom: 20px;
                color: #333;
            }

            .modal-input {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 4px;
                margin-bottom: 20px;
                box-sizing: border-box;
            }

            .modal-buttons {
                display: flex;
                gap: 10px;
                justify-content: center;
            }

            .modal-btn {
                padding: 8px 20px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-weight: 600;
                flex: 1;
            }

            .modal-btn-confirm {
                background: #2196F3;
                color: white;
            }

            .modal-btn-confirm:hover {
                background: #1976D2;
            }

            .modal-btn-cancel {
                background: #e0e0e0;
                color: #333;
            }

            .modal-btn-cancel:hover {
                background: #d0d0d0;
            }

            @media (max-width: 768px) {
                .view-container {
                    padding: 15px;
                }

                .view-header h2 {
                    font-size: 20px;
                }

                .view-meta {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .meta-left {
                    flex-direction: column;
                    gap: 8px;
                }

                .action-buttons {
                    flex-direction: column;
                }

                .btn {
                    width: 100%;
                }

                .modal-content {
                    width: 90%;
                    max-width: 350px;
                }
            }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <div class="view-container">
            <!-- 제목과 메타정보 -->
            <div class="view-header">
                <h2 th:text="${post.title}">문의 제목</h2>
                <div class="view-meta">
                    <div class="meta-left">
                        <div class="meta-item">
                            <span class="material-icons">person</span>
                            <span th:text="${post.author}">작성자</span>
                        </div>
                        <div class="meta-item">
                            <span class="material-icons">calendar_today</span>
                            <span th:text="${#dates.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-02-21 10:30</span>
                        </div>
                        <div class="meta-item">
                            <span class="material-icons">visibility</span>
                            <span th:text="${post.views}">0</span> 조회
                        </div>
                    </div>
                    <span class="answer-badge" th:if="${post.answer}">답변 완료</span>
                    <span class="answer-badge pending" th:unless="${post.answer}">답변 대기중</span>
                </div>
            </div>

            <!-- 연락처 정보 -->
            <div class="contact-info">
                <strong>📞 작성자 연락처</strong>
                <p>이메일: <span th:text="${post.email}">user@example.com</span></p>
                <p>연락처: <span th:text="${post.phone}">010-1234-5678</span></p>
            </div>

            <!-- 문의 내용 -->
            <div class="view-content" th:text="${post.content}">
                문의 내용이 여기에 표시됩니다.
            </div>

            <!-- 답변 영역 -->
            <div class="answer-section">
                <h3>
                    <span class="material-icons">chat_bubble</span>
                    담당자 답변
                </h3>
                <div class="answer-content" th:if="${post.answer}" th:text="${post.answer}">
                    답변 내용이 여기에 표시됩니다.
                </div>
                <div class="no-answer" th:unless="${post.answer}">
                    아직 답변이 등록되지 않았습니다. 곧 담당자가 검토하고 답변을 드리겠습니다.
                </div>
            </div>

            <!-- 작업 버튼 -->
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="location.href='/support/qna'">목록</button>
                <button class="btn btn-secondary" id="editBtn" onclick="showPasswordModal('edit')">수정</button>
                <button class="btn btn-danger" id="deleteBtn" onclick="showPasswordModal('delete')">삭제</button>
            </div>
        </div>

        <!-- 비밀번호 확인 모달 -->
        <div class="modal-overlay" id="passwordModal">
            <div class="modal-content">
                <div class="modal-title" id="modalTitle">비밀번호를 입력해주세요</div>
                <input type="password" class="modal-input" id="modalPassword" placeholder="비밀번호">
                <div class="modal-buttons">
                    <button class="modal-btn modal-btn-confirm" onclick="confirmPassword()">확인</button>
                    <button class="modal-btn modal-btn-cancel" onclick="closePasswordModal()">취소</button>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            let currentAction = '';

            function showPasswordModal(action) {
                currentAction = action;
                const modal = document.getElementById('passwordModal');
                const title = document.getElementById('modalTitle');
                
                if (action === 'edit') {
                    title.textContent = '수정하시려면 비밀번호를 입력해주세요';
                } else if (action === 'delete') {
                    title.textContent = '삭제하시려면 비밀번호를 입력해주세요';
                }
                
                document.getElementById('modalPassword').value = '';
                modal.classList.add('active');
                document.getElementById('modalPassword').focus();
            }

            function closePasswordModal() {
                document.getElementById('passwordModal').classList.remove('active');
                currentAction = '';
            }

            function confirmPassword() {
                const password = document.getElementById('modalPassword').value;
                
                if (!password) {
                    alert('비밀번호를 입력해주세요.');
                    return;
                }

                // 실제 구현에서는 서버에서 비밀번호 검증
                // 여기서는 클라이언트 단계에서만 처리
                if (currentAction === 'edit') {
                    // 수정 페이지로 이동 (실제로는 비밀번호 검증 후)
                    alert('수정 기능은 추후 구현됩니다.');
                    closePasswordModal();
                } else if (currentAction === 'delete') {
                    if (confirm('정말 삭제하시겠습니까?')) {
                        // 삭제 처리 (실제로는 비밀번호 검증 후)
                        alert('삭제 기능은 추후 구현됩니다.');
                        closePasswordModal();
                    }
                }
            }

            // 엔터 키로 확인
            document.getElementById('modalPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    confirmPassword();
                }
            });

            // 모달 외부 클릭 시 닫기
            document.getElementById('passwordModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closePasswordModal();
                }
            });
        </script>
    </th:block>
</body>
</html>
