<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
    <title>온라인 예배</title>
    <style>
        .worship-live {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 10px 60px;
        }

        .page-header {
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid #e6e6e6;
        }

        .page-header h2 {
            font-size: 26px;
            font-weight: 700;
            color: #222;
            margin-bottom: 6px;
        }

        .page-header p {
            color: #666;
            font-size: 15px;
        }

        .channel-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .channel-actions a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            background: #111;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin: 20px 0 16px;
            flex-wrap: wrap;
        }

        .tab-btn {
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #0f6b4d;
            color: #fff;
            border-color: #0f6b4d;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .video-frame {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #f3f3f3;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .video-frame iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .panel-note {
            margin-top: 14px;
            color: #666;
            font-size: 14px;
        }

        .panel-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 260px;
            border-radius: 12px;
            border: 1px dashed #cfcfcf;
            background: #fafafa;
            padding: 20px;
            color: #666;
        }

        .panel-placeholder a {
            color: #0f6b4d;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .channel-actions a {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <div class="worship-live">
            <div class="page-header">
                <h2>온라인 예배</h2>
                <p>유튜브 채널에서 예배 영상과 실시간 예배를 시청하실 수 있습니다.</p>
                <div class="channel-actions">
                    <a href="https://www.youtube.com/@dsr87450" target="_blank" rel="noopener">채널 바로가기</a>
                    <a href="https://www.youtube.com/@dsr87450/videos" target="_blank" rel="noopener">영상 보기</a>
                    <a href="https://www.youtube.com/@dsr87450/shorts" target="_blank" rel="noopener">Shorts 보기</a>
                    <a href="https://www.youtube.com/@dsr87450/live" target="_blank" rel="noopener">실시간 보기</a>
                </div>
            </div>

            <div class="tabs" role="tablist">
                <button class="tab-btn active" type="button" data-target="videos" role="tab" aria-selected="true">동영상</button>
                <button class="tab-btn" type="button" data-target="shorts" role="tab" aria-selected="false">Shorts</button>
                <button class="tab-btn" type="button" data-target="live" role="tab" aria-selected="false">실시간</button>
            </div>

            <div class="tab-panel active" id="videos" role="tabpanel">
                <div class="video-frame">
                    <iframe
                        title="교회 유튜브 동영상"
                        src="https://www.youtube.com/embed?listType=user&list=dsr87450"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen
                    ></iframe>
                </div>
                <div class="panel-note">최신 업로드 영상은 채널 영상 탭에서 확인할 수 있습니다.</div>
            </div>

            <div class="tab-panel" id="shorts" role="tabpanel">
                <div class="panel-placeholder">
                    Shorts는 유튜브 정책상 외부 임베드가 제한될 수 있습니다.<br>
                    <a href="https://www.youtube.com/@dsr87450/shorts" target="_blank" rel="noopener">Shorts 바로가기</a>
                </div>
                <div class="panel-note">필요 시 추후 Shorts 플레이리스트 임베드를 추가할 수 있습니다.</div>
            </div>

            <div class="tab-panel" id="live" role="tabpanel">
                <div class="panel-placeholder">
                    실시간 예배는 방송 시작 시 자동으로 표시됩니다.<br>
                    <a href="https://www.youtube.com/@dsr87450/live" target="_blank" rel="noopener">실시간 페이지 바로가기</a>
                </div>
                <div class="panel-note">실시간 영상 임베드를 위한 채널 ID가 확인되면 바로 연결할 수 있습니다.</div>
            </div>
        </div>
    </div>

    <script>
        const tabButtons = document.querySelectorAll(".tab-btn");
        const tabPanels = document.querySelectorAll(".tab-panel");

        const setActiveTab = (targetId) => {
            tabButtons.forEach((button) => {
                const isActive = button.dataset.target === targetId;
                button.classList.toggle("active", isActive);
                button.setAttribute("aria-selected", String(isActive));
            });

            tabPanels.forEach((panel) => {
                panel.classList.toggle("active", panel.id === targetId);
            });
        };

        tabButtons.forEach((button) => {
            button.addEventListener("click", () => {
                setActiveTab(button.dataset.target);
            });
        });
    </script>
</body>
</html>
