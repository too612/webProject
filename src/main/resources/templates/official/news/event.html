<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>다사랑교회 - 이벤트 일정</title>
    <th:block layout:fragment="css">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <style>
            :root {
                --calendar-border: #e5e7eb;
                --calendar-bg: #ffffff;
                --calendar-muted: #6b7280;
                --calendar-primary: #1e88e5;
                --calendar-accent: #0ea5e9;
                --calendar-cell-bg: #f9fafb;
            }

            .event-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }
            .event-header h2 {
                margin: 0;
                font-size: 24px;
                font-weight: 700;
            }
            .month-nav {
                display: flex;
                gap: 10px;
                align-items: center;
            }
            .nav-btn {
                background: white;
                border: 1px solid var(--calendar-border);
                border-radius: 8px;
                padding: 8px 12px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
                font-weight: 600;
            }
            .nav-btn:hover {
                border-color: var(--calendar-primary);
                color: var(--calendar-primary);
            }
            .month-label {
                font-size: 18px;
                font-weight: 700;
            }
            .calendar-layout {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 20px;
            }
            .calendar-panel {
                background: var(--calendar-bg);
                border: 1px solid var(--calendar-border);
                border-radius: 16px;
                padding: 20px;
            }
            .calendar-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 8px;
            }
            .weekday {
                text-align: center;
                font-weight: 600;
                color: var(--calendar-muted);
                padding-bottom: 10px;
            }
            .day-cell {
                background: var(--calendar-cell-bg);
                border: 1px solid var(--calendar-border);
                border-radius: 10px;
                min-height: 110px;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 6px;
                cursor: pointer;
                position: relative;
            }
            .day-cell:hover {
                border-color: var(--calendar-primary);
            }
            .day-number {
                font-weight: 700;
                font-size: 13px;
            }
            .day-number.muted {
                color: #c4c4c4;
            }
            .event-chip {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 11px;
                padding: 4px 6px;
                border-radius: 6px;
                color: white;
                font-weight: 600;
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
            }
            .event-chip .time {
                font-size: 10px;
                opacity: 0.9;
            }
            .event-bar {
                position: absolute;
                left: 6px;
                right: 6px;
                height: 6px;
                border-radius: 999px;
                top: 26px;
                opacity: 0.4;
            }
            .day-cell.active {
                border-color: var(--calendar-primary);
                box-shadow: 0 0 0 2px rgba(30, 136, 229, 0.2);
            }
            .side-panel {
                background: var(--calendar-bg);
                border: 1px solid var(--calendar-border);
                border-radius: 16px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .side-panel h3 {
                margin: 0;
                font-size: 18px;
            }
            .event-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .event-card {
                border: 1px solid var(--calendar-border);
                border-radius: 12px;
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 6px;
                background: #fefefe;
            }
            .event-card .title {
                font-weight: 700;
            }
            .event-card .meta {
                font-size: 12px;
                color: var(--calendar-muted);
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .event-card .tag {
                font-size: 11px;
                font-weight: 600;
                padding: 2px 8px;
                border-radius: 999px;
                width: fit-content;
                color: white;
            }
            .empty-state {
                color: var(--calendar-muted);
                font-size: 13px;
            }
            .add-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: var(--calendar-primary);
                color: white;
                border: none;
                padding: 10px 14px;
                border-radius: 10px;
                cursor: pointer;
                font-weight: 600;
            }
            .add-btn:hover {
                background: #1565c0;
            }

            .modal-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1000;
                justify-content: center;
                align-items: center;
            }
            .modal-content {
                background: white;
                padding: 24px;
                border-radius: 12px;
                width: 480px;
                max-width: 90%;
            }
            .modal-title {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 16px;
            }
            .form-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-bottom: 12px;
            }
            .form-group {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .form-group label {
                font-size: 13px;
                color: #444;
                font-weight: 600;
            }
            .form-group input,
            .form-group select {
                padding: 8px 10px;
                border: 1px solid var(--calendar-border);
                border-radius: 8px;
            }
            .modal-actions {
                display: flex;
                justify-content: flex-end;
                gap: 10px;
                margin-top: 16px;
            }
            .btn-secondary {
                background: #e5e7eb;
                border: none;
                padding: 8px 12px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 600;
            }
            .btn-primary {
                background: var(--calendar-primary);
                color: white;
                border: none;
                padding: 8px 12px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 600;
            }
            .btn-primary:hover {
                background: #1565c0;
            }

            @media (max-width: 1024px) {
                .calendar-layout {
                    grid-template-columns: 1fr;
                }
            }
            @media (max-width: 768px) {
                .calendar-panel {
                    padding: 16px;
                }
                .day-cell {
                    min-height: 90px;
                }
                .form-row {
                    grid-template-columns: 1fr;
                }
                .event-header {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 12px;
                }
            }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <div class="event-header">
            <div>
                <h2>이벤트 일정</h2>
                <div style="color: #6b7280; font-size: 13px;">날짜를 선택해 일정을 등록하고 관리하세요.</div>
            </div>
            <div class="month-nav">
                <button type="button" class="nav-btn" id="prevMonth">
                    <span class="material-icons">chevron_left</span>
                    이전
                </button>
                <div class="month-label" id="monthLabel">2026년 02월</div>
                <button type="button" class="nav-btn" id="nextMonth">
                    다음
                    <span class="material-icons">chevron_right</span>
                </button>
            </div>
        </div>

        <div class="calendar-layout">
            <div class="calendar-panel">
                <div class="calendar-grid" id="weekdayRow">
                    <div class="weekday">일</div>
                    <div class="weekday">월</div>
                    <div class="weekday">화</div>
                    <div class="weekday">수</div>
                    <div class="weekday">목</div>
                    <div class="weekday">금</div>
                    <div class="weekday">토</div>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <div class="side-panel">
                <div>
                    <h3 id="selectedDateLabel">선택한 날짜</h3>
                    <div style="color:#6b7280; font-size: 12px;" id="selectedDateSub">날짜를 선택해 주세요.</div>
                </div>
                <button type="button" class="add-btn" id="openEventModal">
                    <span class="material-icons">add</span>
                    일정 등록
                </button>
                <div class="event-list" id="eventList"></div>
            </div>
        </div>

        <div class="modal-overlay" id="eventModal">
            <div class="modal-content">
                <div class="modal-title">이벤트 일정 등록</div>
                <form id="eventForm">
                    <div class="form-group">
                        <label for="eventTitle">제목</label>
                        <input type="text" id="eventTitle" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventType">유형</label>
                            <select id="eventType">
                                <option value="예배">예배</option>
                                <option value="모임">모임</option>
                                <option value="행사">행사</option>
                                <option value="교육">교육</option>
                                <option value="기타">기타</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="eventColor">색상</label>
                            <input type="color" id="eventColor" value="#1e88e5">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="startDate">시작일자</label>
                            <input type="date" id="startDate" required>
                        </div>
                        <div class="form-group">
                            <label for="startTime">시작시간</label>
                            <input type="time" id="startTime" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="endDate">종료일자</label>
                            <input type="date" id="endDate" required>
                        </div>
                        <div class="form-group">
                            <label for="endTime">종료시간</label>
                            <input type="time" id="endTime" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="eventFile">첨부파일</label>
                        <input type="file" id="eventFile">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" id="closeModal">취소</button>
                        <button type="submit" class="btn-primary">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            const calendarGrid = document.getElementById('calendarGrid');
            const monthLabel = document.getElementById('monthLabel');
            const selectedDateLabel = document.getElementById('selectedDateLabel');
            const selectedDateSub = document.getElementById('selectedDateSub');
            const eventList = document.getElementById('eventList');
            const eventModal = document.getElementById('eventModal');
            const openEventModal = document.getElementById('openEventModal');
            const closeModal = document.getElementById('closeModal');
            const eventForm = document.getElementById('eventForm');

            let currentDate = new Date();
            let selectedDate = null;

            function getStoredEvents() {
                const raw = localStorage.getItem('newsEvents');
                try {
                    return raw ? JSON.parse(raw) : [];
                } catch (e) {
                    return [];
                }
            }

            function setStoredEvents(events) {
                localStorage.setItem('newsEvents', JSON.stringify(events));
            }

            function formatDate(date) {
                const yyyy = date.getFullYear();
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const dd = String(date.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            }

            function buildCalendar(date) {
                calendarGrid.innerHTML = '';
                const year = date.getFullYear();
                const month = date.getMonth();
                const firstDay = new Date(year, month, 1);
                const startWeekday = firstDay.getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const prevMonthDays = new Date(year, month, 0).getDate();

                monthLabel.textContent = `${year}년 ${String(month + 1).padStart(2, '0')}월`;

                const totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;
                const events = getStoredEvents();

                for (let cell = 0; cell < totalCells; cell++) {
                    const dayCell = document.createElement('div');
                    dayCell.className = 'day-cell';

                    let cellDate;
                    let displayNumber;
                    if (cell < startWeekday) {
                        displayNumber = prevMonthDays - (startWeekday - cell - 1);
                        cellDate = new Date(year, month - 1, displayNumber);
                        dayCell.classList.add('muted');
                    } else if (cell >= startWeekday + daysInMonth) {
                        displayNumber = cell - (startWeekday + daysInMonth) + 1;
                        cellDate = new Date(year, month + 1, displayNumber);
                        dayCell.classList.add('muted');
                    } else {
                        displayNumber = cell - startWeekday + 1;
                        cellDate = new Date(year, month, displayNumber);
                    }

                    const dateKey = formatDate(cellDate);
                    const dayNumber = document.createElement('div');
                    dayNumber.className = 'day-number' + (dayCell.classList.contains('muted') ? ' muted' : '');
                    dayNumber.textContent = displayNumber;
                    dayCell.appendChild(dayNumber);

                    const dayEvents = events
                        .filter(ev => dateKey >= ev.startDate && dateKey <= ev.endDate)
                        .sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));

                    if (dayEvents.length > 0) {
                        const bar = document.createElement('div');
                        bar.className = 'event-bar';
                        bar.style.background = dayEvents[0].color;
                        dayCell.appendChild(bar);
                    }

                    dayEvents.slice(0, 2).forEach(ev => {
                        const chip = document.createElement('div');
                        chip.className = 'event-chip';
                        chip.style.background = ev.color;
                        chip.innerHTML = `<span class="time">${ev.startTime}</span><span>${ev.title}</span>`;
                        dayCell.appendChild(chip);
                    });

                    dayCell.dataset.date = dateKey;
                    dayCell.addEventListener('click', () => selectDate(dateKey));
                    calendarGrid.appendChild(dayCell);
                }

                refreshSelection();
            }

            function selectDate(dateKey) {
                selectedDate = dateKey;
                refreshSelection();
            }

            function refreshSelection() {
                document.querySelectorAll('.day-cell').forEach(cell => {
                    cell.classList.toggle('active', cell.dataset.date === selectedDate);
                });

                if (selectedDate) {
                    selectedDateLabel.textContent = selectedDate.replaceAll('-', '.');
                    selectedDateSub.textContent = '이 날짜의 일정 목록입니다.';
                    renderEventList(selectedDate);
                } else {
                    selectedDateLabel.textContent = '선택한 날짜';
                    selectedDateSub.textContent = '날짜를 선택해 주세요.';
                    eventList.innerHTML = '<div class="empty-state">선택된 일정이 없습니다.</div>';
                }
            }

            function renderEventList(dateKey) {
                const events = getStoredEvents()
                    .filter(ev => dateKey >= ev.startDate && dateKey <= ev.endDate)
                    .sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));

                if (events.length === 0) {
                    eventList.innerHTML = '<div class="empty-state">등록된 일정이 없습니다.</div>';
                    return;
                }

                eventList.innerHTML = '';
                events.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <div class="tag" style="background:${ev.color}">${ev.type}</div>
                        <div class="title">${ev.title}</div>
                        <div class="meta">
                            <span>기간: ${ev.startDate} ${ev.startTime} ~ ${ev.endDate} ${ev.endTime}</span>
                            <span>첨부: ${ev.fileName || '없음'}</span>
                        </div>
                    `;
                    eventList.appendChild(card);
                });
            }

            document.getElementById('prevMonth').addEventListener('click', () => {
                currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
                buildCalendar(currentDate);
            });

            document.getElementById('nextMonth').addEventListener('click', () => {
                currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
                buildCalendar(currentDate);
            });

            openEventModal.addEventListener('click', () => {
                if (!selectedDate) {
                    alert('먼저 날짜를 선택해주세요.');
                    return;
                }
                eventModal.style.display = 'flex';
                document.getElementById('startDate').value = selectedDate;
                document.getElementById('endDate').value = selectedDate;
                document.getElementById('startTime').value = '09:00';
                document.getElementById('endTime').value = '10:00';
            });

            closeModal.addEventListener('click', () => {
                eventModal.style.display = 'none';
                eventForm.reset();
            });

            eventModal.addEventListener('click', (e) => {
                if (e.target === eventModal) {
                    eventModal.style.display = 'none';
                    eventForm.reset();
                }
            });

            eventForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const newEvent = {
                    id: Date.now().toString(),
                    title: document.getElementById('eventTitle').value.trim(),
                    type: document.getElementById('eventType').value,
                    color: document.getElementById('eventColor').value,
                    startDate: document.getElementById('startDate').value,
                    startTime: document.getElementById('startTime').value,
                    endDate: document.getElementById('endDate').value,
                    endTime: document.getElementById('endTime').value,
                    fileName: document.getElementById('eventFile').files[0]?.name || ''
                };

                if (!newEvent.title) {
                    alert('제목을 입력해주세요.');
                    return;
                }

                if (newEvent.endDate < newEvent.startDate) {
                    alert('종료일자는 시작일자보다 빠를 수 없습니다.');
                    return;
                }

                const events = getStoredEvents();
                events.push(newEvent);
                setStoredEvents(events);

                eventModal.style.display = 'none';
                eventForm.reset();
                buildCalendar(currentDate);
                renderEventList(selectedDate);
            });

            buildCalendar(currentDate);
        </script>
    </th:block>
</body>
</html>
